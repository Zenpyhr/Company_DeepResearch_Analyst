steps:
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "${_IMAGE_URI}", "."]

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "${_IMAGE_URI}"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE_NAME}"
      - "--image=${_IMAGE_URI}"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8080"

substitutions:
  _SERVICE_NAME: nvda-analyst-agent
  _REGION: us-central1
  _IMAGE_URI: "${_REGION}-docker.pkg.dev/$PROJECT_ID/nvda-analyst-agent/app:latest"
